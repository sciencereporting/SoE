        const allDates = rawData.map(item => item.date);
        
        function getAxisBounds(values) {
            const validValues = values.filter(v => v !== null && v !== undefined && !isNaN(v));
            if (validValues.length === 0) return { min: 0, max: 100 };
            const min = Math.min(...validValues);
            const max = Math.max(...validValues);
            const padding = (max - min) * 0.1; 
            return {
                min: Math.floor(min - padding),
                max: Math.ceil(max + padding)
            };
        }

        const tempBounds = getAxisBounds(rawData.map(item => item['Temperature (30 day moving average)']));
        const pm10Bounds = getAxisBounds(rawData.map(item => item['PM10 ((30 day moving average))']));

        let tempMaData = [];
        let pm10MaData = [];

        const totalDuration = 20000; 
        const updateFrequency = rawData.length > 0 ? (totalDuration / rawData.length) : 100;

        var baseOption = {
            animationDurationUpdate: updateFrequency,
            animationEasingUpdate: 'linear',
            
            graphic: {
                elements: [
                    {
                        type: 'text',
                        id: 'seasonWatermark',
                        right: '10%', 
                        top: '15%',
                        z: 1, 
                        silent: true, 
                        style: {
                            text: '',
                            fontSize: 80, 
                            fontWeight: 'bold', 
                            fill: 'rgba(200, 200, 200, 0)', 
                        }
                    }
                ]
            },

            tooltip: { 
                trigger: 'axis',
                formatter: function (params) {
                    if (!params || params.length === 0) return '';
                    
                    const rawDate = params[0].name;
                    const date = new Date(rawDate);
                    let displayDate = rawDate; 
                    
                    if (!isNaN(date.getTime())) {
                        const year = date.getFullYear();
                        const month = String(date.getMonth() + 1).padStart(2, '0');
                        const day = String(date.getDate()).padStart(2, '0');
                        const hours = String(date.getHours()).padStart(2, '0');
                        const mins = String(date.getMinutes()).padStart(2, '0');
                        displayDate = `${year}-${month}-${day} ${hours}:${mins}`;
                    }

                    let tooltipHtml = `<strong>${displayDate}</strong><br/>`;
                    params.forEach(param => {
                        const unit = param.seriesIndex === 0 ? '°C' : 'µg/m³';
                        const val = param.value !== undefined && param.value !== null ? Number(param.value).toFixed(1) : '-';
                        tooltipHtml += `${param.marker} ${param.seriesName}: <b>${val}</b> ${unit}<br/>`;
                    });
                    return tooltipHtml;
                }
            },
            legend: { 
                data: ['Temperature (30 day Moving Average)', 'PM10 (30 day Moving Average)'] 
            },
            grid: { left: '5%', right: '5%', bottom: '10%', containLabel: true },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: allDates,
                axisLabel: {
                    formatter: function (value) {
                        const date = new Date(value);
                        if (isNaN(date.getTime())) return value; 
                        const month = date.toLocaleString('default', { month: 'short' });
                        const year = date.getFullYear();
                        return `${month} ${year}`;
                    }
                }
            },
            yAxis: [
                {
                    type: 'value',
                    name: 'Temperature (°C)',
                    position: 'left',
                    min: tempBounds.min,
                    max: tempBounds.max,
                    axisLine: { show: true, lineStyle: { color: '#ee6666' } },
                    axisLabel: { formatter: '{value} °C' }
                },
                {
                    type: 'value',
                    name: 'PM10 (µg/m³)',
                    position: 'right',
                    min: pm10Bounds.min,
                    max: pm10Bounds.max,
                    axisLine: { show: true, lineStyle: { color: '#000000' } }, 
                    axisLabel: { formatter: '{value} µg/m³' }
                }
            ],
            series: [
                {
                    name: 'Temperature (30 day Moving Average)',
                    type: 'line',
                    yAxisIndex: 0,
                    showSymbol: false,
                    data: tempMaData,
                    itemStyle: { color: '#ee6666' }, 
                    lineStyle: { width: 3, color: '#ee6666', type: 'dashed' } 
                },
                {
                    name: 'PM10 (30 day Moving Average)',
                    type: 'line',
                    yAxisIndex: 1,
                    showSymbol: false,
                    data: pm10MaData,
                    itemStyle: { color: '#000000' }, 
                    lineStyle: { width: 3, color: '#000000', type: 'solid' },
                    markArea: { data: [] }
                }
            ]
        };

        myChart.setOption(baseOption);

        let currentIndex = 0;
        let timer = null;
        const startBtn = document.getElementById('start-btn');

        function runAnimation() {
            if (timer) clearInterval(timer);
            
            currentIndex = 0;
            tempMaData = [];
            pm10MaData = [];
            
            startBtn.innerText = "Restart Animation";

            myChart.setOption({
                graphic: { elements: [{ id: 'seasonWatermark', style: { fill: 'rgba(0,0,0,0)', text: '' } }] },
                series: [
                    { data: [] }, 
                    { data: [], markArea: { data: [] } }
                ]
            });

            timer = setInterval(function() {
                if (currentIndex >= rawData.length) {
                    clearInterval(timer); 

                    let markAreaData = [];
                    let currentStart = null;
                    let textAdded = false; 

                    allDates.forEach((dateStr, index) => {
                        const d = new Date(dateStr);
                        if (isNaN(d.getTime())) return;
                        
                        const month = d.getMonth() + 1; 
                        const isTargetMonth = month >= 5 && month <= 10; 

                        if (isTargetMonth && currentStart === null) {
                            currentStart = dateStr;
                        } else if (!isTargetMonth && currentStart !== null) {
                            const blockText = textAdded ? '' : `Winter Period
When Temperature is lower air quality is worse.`;
                            textAdded = true; 

                            markAreaData.push([
                                { xAxis: currentStart, name: blockText, itemStyle: { color: 'rgba(135, 206, 250, 0.3)' } },
                                { xAxis: allDates[index - 1] }
                            ]);
                            currentStart = null;
                        }
                    });

                    if (currentStart !== null) {
                        const blockText = textAdded ? '' : `Winter Period
When Temperature is lower air quality is worse.`;
                        markAreaData.push([
                            { xAxis: currentStart, name: blockText, itemStyle: { color: 'rgba(135, 206, 250, 0.3)' } },
                            { xAxis: allDates[allDates.length - 1] }
                        ]);
                    }

                    myChart.setOption({
                        graphic: { elements: [{ id: 'seasonWatermark', style: { fill: 'rgba(0,0,0,0)' } }] },
                        series: [
                            { }, 
                            {
                                markArea: {
                                    silent: true, 
                                    label: {
                                        show: true,
                                        position: 'insideTop',
                                        color: '#333',
                                        fontSize: 14,
                                        fontWeight: 'bold',
                                        padding: [15, 0, 0, 0] 
                                    },
                                    data: markAreaData
                                }
                            }
                        ]
                    });
                    
                    return;
                }
                
                const currentDateStr = rawData[currentIndex].date;
                const currentMonth = new Date(currentDateStr).getMonth() + 1;
                
                let seasonText = '';
                let seasonColor = '';

                if (currentMonth >= 3 && currentMonth <= 5) {
                    seasonText = '🍂 Autumn';
                    seasonColor = 'rgba(211, 84, 0, 0.3)'; 
                } else if (currentMonth >= 6 && currentMonth <= 8) {
                    seasonText = '❄️ Winter';
                    seasonColor = 'rgba(41, 128, 185, 0.3)'; 
                } else if (currentMonth >= 9 && currentMonth <= 11) {
                    seasonText = '🌱 Spring';
                    seasonColor = 'rgba(39, 174, 96, 0.3)'; 
                } else {
                    seasonText = '☀️ Summer';
                    seasonColor = 'rgba(241, 196, 15, 0.3)'; 
                }

                tempMaData.push(rawData[currentIndex]['Temperature (30 day moving average)']); 
                pm10MaData.push(rawData[currentIndex]['PM10 ((30 day moving average))']); 

                myChart.setOption({
                    graphic: {
                        elements: [
                            {
                                id: 'seasonWatermark',
                                style: {
                                    text: seasonText,
                                    fill: seasonColor
                                }
                            }
                        ]
                    },
                    series: [
                        { data: tempMaData },
                        { data: pm10MaData }
                    ]
                });
                
                currentIndex++;
            }, updateFrequency);
        }

        // Attach event listener so the user can restart it manually
        startBtn.addEventListener('click', runAnimation);

        // Call the function immediately to auto-start the animation on load
        runAnimation();

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
