    <script>
        function toggleLegendBody() {
            var body = document.getElementById("legend-box-body");
            var btn = document.getElementById("minify-btn");
            if (body.style.display === "none") {
                body.style.display = "block";
                btn.innerHTML = "[-]";
            } else {
                body.style.display = "none";
                btn.innerHTML = "[+]";
            }
        }

        dragLegendElement(document.getElementById("movable-legend"));

        function dragLegendElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            var header = elmnt.getElementsByClassName("legend-box-header")[0];
            
            if (header) {
                header.onmousedown = dragMouseDown;
            } else {
                elmnt.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                if(e.target.id === "minify-btn") return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                elmnt.style.bottom = "auto";
                elmnt.style.right = "auto";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>
